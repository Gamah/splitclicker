version: '3.9'

services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT_HASH: ${GIT_HASH:-}
    restart: unless-stopped
    ports:
      # MUST stay bound to 127.0.0.1. Docker publishes ports by inserting DOCKER-chain
      # iptables rules that BYPASS UFW — a bare "6969:6969" would expose the app to the
      # whole internet even with `ufw deny 6969`. Binding to loopback DNATs only from
      # 127.0.0.1, so only Caddy (terminating TLS on the host) can reach it.
      - "127.0.0.1:6969:6969"
    environment:
      DATABASE_URL: "postgres://splitclicker@postgres:5432/splitclicker?sslmode=disable"
      PORT: "6969"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      # Skin image + winner-lock countdown are edited live in ./data/config.json
      # (see the volume below). These envs are only fallbacks when config.json is
      # absent / a field is blank.
      RUNTIME_DIR: /data
      SKIN_IMAGE: "${SKIN_IMAGE:-}"
      WINNER_LOCK_TIME: "${WINNER_LOCK_TIME:-}"
      # Game tunables (optional — omit to use defaults from internal/game/config.go)
      ARM_MIN_SEC: "${ARM_MIN_SEC:-10}"
      ARM_MAX_SEC: "${ARM_MAX_SEC:-120}"
      CLICKS_PER_PLAYER: "${CLICKS_PER_PLAYER:-1}"
      MIN_CLICKS: "${MIN_CLICKS:-1}"
      ROUNDS_PER_GAME: "${ROUNDS_PER_GAME:-10}"
    volumes:
      # Host-editable skin images + config.json. Relative to this compose file,
      # so ../data == server/data. Edit data/config.json or replace an image in
      # data/media and it's served live — no rebuild, no restart.
      - ../data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: splitclicker
      POSTGRES_USER: splitclicker
      # Loopback + internal-network only; host access is via `docker exec`.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Loopback only (same UFW-bypass reason as the app) — just for host tooling
      # like `make psql`; the app reaches Postgres over the internal Docker network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitclicker"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

networks:
  internal:

volumes:
  postgres_data:
