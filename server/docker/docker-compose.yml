# The `name:` below pins the Compose project, which namespaces containers,
# networks and volumes (splitclicker_*). Without it the project defaults to the
# parent dir name ("docker"), colliding with any other repo whose compose file
# also lives under docker/ (they'd share container `docker-app-1`, the network
# and the postgres volume — which silently took prod's :8080 app offline).
name: splitclicker

services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT_HASH: ${GIT_HASH:-}
    restart: unless-stopped
    ports:
      # MUST stay bound to 127.0.0.1. Docker publishes ports by inserting DOCKER-chain
      # iptables rules that BYPASS UFW — a bare "6969:6969" would expose the app to the
      # whole internet even with `ufw deny 6969`. Binding to loopback DNATs only from
      # 127.0.0.1, so only Caddy (terminating TLS on the host) can reach it.
      - "127.0.0.1:6969:6969"
    environment:
      DATABASE_URL: "postgres://splitclicker@postgres:5432/splitclicker?sslmode=disable"
      PORT: "6969"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      # Password for the /admin dashboard (blank disables it). Set in .env.
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # Skin image, winner-lock countdown, and game tunables are configured in
      # ./data/config.json (bind-mounted below), not here.
      RUNTIME_DIR: /data
    volumes:
      # Host-editable skin images + config.json. Relative to this compose file,
      # so ../data == server/data. Edit data/config.json or replace an image in
      # data/media and it's served live — no rebuild, no restart.
      - ../data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: splitclicker
      POSTGRES_USER: splitclicker
      # Loopback + internal-network only; host access is via `docker exec`.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Loopback only (same UFW-bypass reason as the app) — just for host tooling
      # like `make psql`; the app reaches Postgres over the internal Docker network.
      # Host port 5434 (not 5432) so it doesn't collide with another stack's
      # Postgres publish on the same box (rotaliate uses 5432, its test uses 5433).
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitclicker"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

networks:
  internal:

volumes:
  postgres_data:
